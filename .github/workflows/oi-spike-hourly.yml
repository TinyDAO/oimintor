# 每小时扫描 Top100 永续 OI 24h 涨幅；≥50% 时 Telegram 提醒（同一段行情只提醒一次，见 scripts/oi-spike-alert.mjs）
name: OI spike Telegram alert

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 持久化「已推送」状态，避免重复提醒（job 成功结束时自动写回）
      - uses: actions/cache@v4
        with:
          path: scripts/.oi-alert-state.json
          key: oi-alert-state-v1-${{ github.repository_id }}

      - name: Run OI spike alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOP_N: '100'
          OI_THRESHOLD_PCT: '50'
        run: node scripts/oi-spike-alert.mjs
