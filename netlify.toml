[[redirects]]
  from = "/api/fapi/*"
  to = "https://fapi.binance.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/bapi/*"
  to = "https://www.binance.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/web3/*"
  to = "https://web3.binance.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/cg/*"
  to = "https://api.coingecko.com/api/v3/:splat"
  status = 200
  force = true
